<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Iraq Logistics UK | Elite Agent Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-shell">
        <a class="brand" href="#" aria-label="Iraq Logistics UK Agents">
          <img src="assets/iraq-logistics-logo-cropped.png" alt="Iraq Logistics">
        </a>
        <div class="title-block">
          <p class="eyebrow">Elite Agent Network</p>
          <h1>Iraq Logistics UK</h1>
          <p class="subline">Direct WhatsApp contacts and live map directions across the UK.</p>
        </div>
      </div>

      <section class="search-panel" aria-label="Agent search">
        <label class="search-box">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="agentSearch" type="search" placeholder="Search city, agent, place, phone..." autocomplete="off">
        </label>
        <div class="header-stats" aria-label="Directory summary">
          <span><strong id="resultCount">0</strong> agents</span>
          <span>WhatsApp ready</span>
          <span>Map links</span>
        </div>
      </section>
    </header>

    <main>
      <section class="toolbar" aria-label="Directory controls">
        <div>
          <p class="section-kicker">Nationwide coverage</p>
          <h2>UK branches and drivers</h2>
        </div>
        <div class="filter-tabs" role="tablist" aria-label="Filter agents">
          <button class="filter-tab active" type="button" data-filter="all">All</button>
          <button class="filter-tab" type="button" data-filter="branch">Branches</button>
          <button class="filter-tab" type="button" data-filter="warehouse">Warehouses</button>
        </div>
      </section>

      <section id="agentGrid" class="agent-grid" aria-live="polite"></section>

      <section id="emptyState" class="empty-state" hidden>
        <h2>No agents found</h2>
        <p>Try a different name, city, postcode, or phone number.</p>
      </section>
    </main>

    <template id="agentCardTemplate">
      <article class="agent-card">
        <div class="card-topline">
          <span class="area-code"></span>
          <span class="card-kind"></span>
        </div>
        <div class="card-brand">
          <img src="assets/iraq-logistics-logo-cropped.png" alt="" aria-hidden="true">
        </div>
        <div class="card-main">
          <h3></h3>
          <p class="agent-place"></p>
          <p class="agent-person"></p>
        </div>
        <a class="address-link" target="_blank" rel="noopener">
          <span class="pin-icon" aria-hidden="true"></span>
          <span class="address-text"></span>
        </a>
        <div class="phone-list"></div>
        <div class="card-actions" data-html2canvas-ignore="true">
          <a class="map-card" target="_blank" rel="noopener" title="Open map" aria-label="Open address in Google Maps">
            <span class="pin-icon" aria-hidden="true"></span>
            Map
          </a>
          <button class="save-card" type="button" title="Save JPG" aria-label="Save card as JPG">
            <span class="download-icon" aria-hidden="true"></span>
            Save JPG
          </button>
        </div>
      </article>
    </template>

    <footer class="site-footer">Iraq Logistics UK agent directory</footer>

    <script src="assets/logo-data.js"></script>
    <script src="assets/html2canvas.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
